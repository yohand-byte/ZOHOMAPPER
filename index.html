function Cp({text}){const[ok,s]=useState(false);return(<button onClick={()=>{navigator.clipboard.writeText(text);s(true);setTimeout(()=>s(false),1500)}} style={{background:ok?'#10b981':'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',color:ok?'#fff':'#888',padding:'4px 12px',borderRadius:'5px',cursor:'pointer',fontSize:'11px',fontFamily:'monospace'}}>{ok?'✓':'⎘'}</button>)}

const bd=f.fix?'1px solid rgba(16,185,129,0.25)':f.warn?'1px solid rgba(234,179,8,0.2)':f.hl?'1px solid rgba(168,85,247,0.2)':'1px solid rgba(255,255,255,0.05)';
return(
<div style={{background:bg,border:bd,borderRadius:'8px',padding:'10px 12px'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px',flexWrap:'wrap',gap:'4px'}}>
<div style={{display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap'}}>
<span style={{fontSize:'12.5px',fontWeight:600,color:'#e4e4e7'}}>{f.ui}</span>
{f.req&&<span style={{fontSize:'7px',fontWeight:700,color:'#ef4444',background:'rgba(239,68,68,0.1)',padding:'2px 4px',borderRadius:'2px'}}>REQUIS</span>}
{f.dd&&<span style={{fontSize:'7px',fontWeight:700,color:'#a855f7',background:'rgba(168,85,247,0.1)',padding:'2px 4px',borderRadius:'2px'}}>DROPDOWN</span>}
{f.fix&&<span style={{fontSize:'7px',fontWeight:700,color:'#10b981',background:'rgba(16,185,129,0.1)',padding:'2px 4px',borderRadius:'2px'}}>VÉRIFIÉ</span>}
{f.warn&&<span style={{fontSize:'7px',fontWeight:700,color:'#eab308',background:'rgba(234,179,8,0.1)',padding:'2px 4px',borderRadius:'2px'}}>IGNORÉ EU</span>}
</div>
<span style={{fontSize:'9px',color:'#444',fontFamily:'monospace'}}>{f.type}</span>
</div>
<div style={{display:'grid',gridTemplateColumns:'1fr 20px 1fr',alignItems:'center',gap:'6px',marginBottom:f.note?'4px':0}}>
<div style={{background:'rgba(255,255,255,0.02)',borderRadius:'4px',padding:'5px 8px'}}>
<div style={{fontSize:'7px',color:'#555',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'1px'}}>UI</div>
<div style={{fontSize:'11px',color:'#999',fontFamily:'monospace',wordBreak:'break-all'}}>{f.uiVal||'—'}</div>
</div>

<div style={{fontSize:'11px',color:'#fafafa',fontFamily:'monospace',fontWeight:500,wordBreak:'break-all'}}>{f.val}</div>
</div>
</div>
{f.note&&<p style={{margin:0,fontSize:'10px',color:f.fix?'#6ee7b7':f.warn?'#fbbf24':'#555',lineHeight:1.3}}>{f.note}</p>}
</div>
)}
