function Copy({text}){const[ok,set]=useState(false);return(<button onClick={()=>{navigator.clipboard.writeText(text);set(true);setTimeout(()=>set(false),1500)}} style={{background:ok?'#10b981':'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',color:ok?'#fff':'#888',padding:'4px 12px',borderRadius:'5px',cursor:'pointer',fontSize:'11px',fontFamily:'monospace'}}>{ok?'✓':'⎘'}</button>)}

function FieldRow({f}){return(
<div style={{background:f.hl?'linear-gradient(135deg,#111 0%,#1a1520 100%)':'#111',border:f.hl?'1px solid rgba(168,85,247,0.2)':'1px solid rgba(255,255,255,0.05)',borderRadius:'8px',padding:'12px 14px'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px',flexWrap:'wrap',gap:'6px'}}>
<div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
<span style={{fontSize:'13px',fontWeight:600,color:'#e4e4e7'}}>{f.ui}</span>
{f.req&&<span style={{fontSize:'8px',fontWeight:700,color:'#ef4444',background:'rgba(239,68,68,0.1)',padding:'2px 5px',borderRadius:'3px'}}>REQUIS</span>}
{f.dd&&<span style={{fontSize:'8px',fontWeight:700,color:'#a855f7',background:'rgba(168,85,247,0.1)',padding:'2px 5px',borderRadius:'3px'}}>DROPDOWN</span>}
</div>
<span style={{fontSize:'10px',color:'#444',fontFamily:'monospace'}}>{f.type}</span>
</div>
<div style={{display:'grid',gridTemplateColumns:'1fr 24px 1fr',alignItems:'center',gap:'8px',marginBottom:f.note?'6px':0}}>
<div style={{background:'rgba(255,255,255,0.02)',borderRadius:'5px',padding:'6px 10px'}}>
<div style={{fontSize:'8px',color:'#555',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'2px'}}>UI</div>
<div style={{fontSize:'12px',color:'#999',fontFamily:'monospace',wordBreak:'break-all'}}>{f.uiVal||'—'}</div>
</div>
<span style={{color:'#f59e0b',textAlign:'center'}}>→</span>
<div style={{background:'rgba(245,158,11,0.03)',border:'1px solid rgba(245,158,11,0.08)',borderRadius:'5px',padding:'6px 10px'}}>
<div style={{fontSize:'8px',color:'#f59e0b',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'2px'}}>{f.api}</div>
<div style={{fontSize:'12px',color:'#fafafa',fontFamily:'monospace',fontWeight:500,wordBreak:'break-all'}}>{f.val}</div>
</div>
</div>
{f.note&&<p style={{margin:0,fontSize:'11px',color:'#666',lineHeight:1.4}}>{f.note}</p>}
</div>
)}

function App(){
const[tab,setTab]=useState("contact");
const[sec,setSec]=useState(0);
const[showP,setShowP]=useState(false);
const data=tab==="contact"?contactFields:salesOrderFields;
const payload=tab==="contact"?contactPayload:soPayload;
const ep=tab==="contact"?`POST /contacts?organization_id=${ORG}`:`POST /salesorders?organization_id=${ORG}`;

return(
<div style={{minHeight:'100vh',background:'#09090b',color:'#fafafa',fontFamily:"'Inter',-apple-system,sans-serif"}}>
<div style={{background:'linear-gradient(135deg,#18181b 0%,#1a1a2e 50%,#16213e 100%)',borderBottom:'1px solid rgba(255,255,255,0.05)',padding:'24px 20px'}}>
<div style={{maxWidth:'920px',margin:'0 auto'}}>
<div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}}>
<span style={{fontSize:'10px',fontWeight:600,color:'#f59e0b',background:'rgba(245,158,11,0.1)',padding:'2px 8px',borderRadius:'3px',textTransform:'uppercase',letterSpacing:'0.5px'}}>Zoho Books/Inventory API</span>
<span style={{fontSize:'10px',color:'#555'}}>•</span>
<span style={{fontSize:'10px',color:'#555',fontFamily:'monospace'}}>Org: {ORG}</span>
<span style={{fontSize:'10px',color:'#555'}}>•</span>
<span style={{fontSize:'10px',color:'#555',fontFamily:'monospace'}}>.eu</span>
</div>
<h1 style={{margin:'0 0 4px',fontSize:'22px',fontWeight:700,letterSpacing:'-0.5px'}}>Zoho API Field Mapper</h1>
<p style={{margin:0,fontSize:'13px',color:'#666'}}>Mapping complet UI → API : Création Client & Commande Client</p>
</div>
</div>
<div style={{maxWidth:'920px',margin:'0 auto',padding:'20px'}}>
<div style={{display:'flex',gap:'8px',marginBottom:'16px'}}>
{[{id:"contact",label:"👤 Création Client",count:contactFields.reduce((a,s)=>a+s.fields.length,0)},{id:"salesorder",label:"🛒 Commande Client",count:salesOrderFields.reduce((a,s)=>a+s.fields.length,0)}].map(t=>(
<button key={t.id} onClick={()=>{setTab(t.id);setSec(0);setShowP(false)}} style={{flex:1,background:tab===t.id?'rgba(245,158,11,0.08)':'rgba(255,255,255,0.03)',border:tab===t.id?'1px solid rgba(245,158,11,0.3)':'1px solid rgba(255,255,255,0.06)',color:tab===t.id?'#f59e0b':'#888',padding:'12px',borderRadius:'8px',cursor:'pointer',fontSize:'14px',fontWeight:600}}>{t.label} <span style={{fontSize:'11px',opacity:0.6}}>({t.count})</span></button>
))}
</div>
<button onClick={()=>setShowP(!showP)} style={{marginBottom:'16px',background:showP?'#f59e0b':'rgba(245,158,11,0.08)',color:showP?'#000':'#f59e0b',border:'1px solid rgba(245,158,11,0.25)',padding:'8px 18px',borderRadius:'6px',cursor:'pointer',fontSize:'12px',fontWeight:600}}>{showP?'✕ Fermer':'{ } Payload JSON'}</button>
{showP&&(
<div style={{marginBottom:'16px',background:'#111',border:'1px solid rgba(245,158,11,0.15)',borderRadius:'10px',overflow:'hidden'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
<code style={{fontSize:'11px',color:'#f59e0b'}}>{ep}</code>
<Copy text={payload}/>
</div>
<pre style={{margin:0,padding:'14px',fontSize:'11px',lineHeight:1.5,fontFamily:"'JetBrains Mono',monospace",color:'#ccc',overflowX:'auto',whiteSpace:'pre-wrap'}}>{payload}</pre>
</div>
)}
<div style={{display:'flex',gap:'4px',marginBottom:'14px',overflowX:'auto',paddingBottom:'4px'}}>
{data.map((s,i)=>(
<button key={i} onClick={()=>setSec(i)} style={{background:sec===i?'rgba(255,255,255,0.07)':'transparent',border:sec===i?'1px solid rgba(255,255,255,0.12)':'1px solid transparent',color:sec===i?'#fafafa':'#666',padding:'6px 12px',borderRadius:'6px',cursor:'pointer',fontSize:'12px',fontWeight:sec===i?600:400,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'5px'}}>
<span>{s.icon}</span> {s.section}
